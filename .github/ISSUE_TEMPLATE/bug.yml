name: Bug report
description: Report reproducible behavior that differs from the specification.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, personal data, or sensitive venue details.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and in which mode (Replay or Live)?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include keyboard/assistive technology details when relevant.
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact areas
      options:
        - label: Safety or operational decision integrity
        - label: Accessibility
        - label: Security or privacy (report privately instead)
        - label: Performance
