name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Full quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - name: Install browser and system dependencies
        run: npx playwright install --with-deps chromium
      - name: Formatting
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: Strict TypeScript
        run: npm run typecheck
      - name: Vitest and coverage
        run: npm run test:coverage
      - name: Machine-readable Vitest report
        run: npm run test:report
      - name: Production build
        run: npm run build
      - name: Bundle performance budget
        run: npm run test:performance
      - name: Lighthouse thresholds
        run: npm run lighthouse
      - name: Dependency security audit
        run: npm run security:audit
      - name: Playwright critical paths
        run: npm run test:e2e
      - name: Generate visible quality evidence
        run: npm run quality:report
      - name: Final evidence-aware build
        run: npm run build
      - name: Upload machine-readable quality evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-evidence
          path: |
            reports/
            coverage/
            playwright-report/
            public/quality/latest.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload production bundle
        uses: actions/upload-artifact@v7
        with:
          name: production-bundle
          path: dist/
          retention-days: 7
