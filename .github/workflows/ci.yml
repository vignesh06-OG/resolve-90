name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Full quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - name: Install browser and system dependencies
        run: npx playwright install --with-deps chromium
      - name: Run types, lint, tests, coverage, build, Lighthouse, audit, and E2E
        run: npm run quality
      - name: Upload machine-readable quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-evidence
          path: |
            reports/
            coverage/
            playwright-report/
            public/quality/latest.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: production-bundle
          path: dist/
          retention-days: 7
